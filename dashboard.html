<!DOCTYPE html>
<html>
<head>

</head>

<body style="background:#020617;color:white;font-family:Arial;">

<script>
  if(localStorage.getItem("login") !== "true"){
    window.location.href = "login.html";
  }
</script>

<div style="padding:20px;">

  <h2>Client Panel 😈</h2>
  <p>Status: Online</p>

  <!-- DRIP -->
  <div class="card">

  </div>

  <!-- HG -->
  <div class="card">
    <h3>HG Client</h3>

</html>
