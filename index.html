<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Panel</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .container {
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header img {
      width: 80px;
      border-radius: 50%;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- HEADER -->
    <div class="header">
      <img src="https://i.imgur.com/8Km9tLL.png">
      <h2>Nyx Panel 😈</h2>
      <p>Simple Client Dashboard</p>
    </div>

    <!-- CARD 1 -->
    <div class="card">
      <img src="https://i.imgur.com/zYxDCQT.jpg">
      <h3>Drip Client</h3>
      <p>Status: Aktif</p>
      <button onclick="alert('Coming Soon')">Open</button>
    </div>

    <!-- CARD 2 -->
    <div class="card">
      <img src="https://i.imgur.com/2yaf2wb.jpg">
      <h3>Script Tools</h3>
      <p>Fitur basic</p>
      <button onclick="alert('Soon')">Access</button>
    </div>

  </div>

</body>
</html>
